  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // FUNÇÃO PARA MOSTRAR MODAL

    function mostrarModal(tipo, mensagem) {

      const header = document.getElementById("modalHeader");
      const titulo = document.getElementById("modalTitulo");
      const texto = document.getElementById("modalMensagem");

      texto.innerHTML = mensagem;

      if (tipo === "erro") {
        header.className = "modal-header bg-danger text-white";
        titulo.innerHTML = "ERRO";
      }

      if (tipo === "sucesso") {
        header.className = "modal-header bg-success text-white";
        titulo.innerHTML = "SUCESSO";
      }

      if (tipo === "info") {
        header.className = "modal-header bg-primary text-white";
        titulo.innerHTML = "INFORMAÇÃO";
      }

      const modal = new bootstrap.Modal(document.getElementById("modalAviso"));
      modal.show();
    }


    // CADASTRAR LIVROS DA SEGUNDA INTERFACE NA COLUNA " I "

      // CADASTRAR LIVROS

      function cadastrarLivro() {

        const nomeLivro = document.getElementById("cadLivro").value.trim();

        if (nomeLivro === "") {
          mostrarModal("erro", "⚠️ Digite o nome do livro para cadastrar.");
          return;
        }

        google.script.run
          .withSuccessHandler(function(msg) {
            mostrarModal("sucesso", msg);
            document.getElementById("cadLivro").value = "";
          })
          .withFailureHandler(function(err) {
            mostrarModal("erro", err.message);
          })
          .cadastrarLivroDisponivel(nomeLivro);
      }


        // ESPERA O DOM CARREGAR E REGISTRA EVENTOS
        document.addEventListener("DOMContentLoaded", function() {

          document
            .getElementById("btnCadasLiv")
            .addEventListener("click", cadastrarLivro);


          document
            .getElementById("btnRemovLiv")
            .addEventListener("click", removerLivro );


          document
            .getElementById("btnBuscLiv")
            .addEventListener("click", buscarLivro);

        });


    // RETIRAR LIVROS DA TABELA 

    function removerLivro() {

      const nomeLivro = document.getElementById("retLivro").value.trim();

      if (nomeLivro === "") {
        mostrarModal("erro", "⚠️ Digite o nome do livro para remover.");
        return;
      }

      google.script.run
        .withSuccessHandler(function(msg) {
          mostrarModal("sucesso", msg);
          document.getElementById("retLivro").value = "";
        })
        .withFailureHandler(function(err) {
          mostrarModal("erro", err.message);
        })
        .removerLivroDisponivel(nomeLivro);
    }

      // BUSCAR LIVROS E PESSOAS

    function buscarLivro() {

      const nomeLivro = document.getElementById("buscLivro").value.trim();

      if (nomeLivro === "") {
        mostrarModal("erro", "⚠️ Digite o nome do livro para buscar.");
        return;
      }

      google.script.run
        .withSuccessHandler(function(res) {

          let mensagemFinal = res.mensagem;

          // Se tiver código, adiciona botão copiar
          if (res.codigo) {
            mensagemFinal += `
              <br><br>
              Código: <strong>${res.codigo}</strong>
              <br>
              <button class="btn btn-sm btn-outline-primary mt-2" onclick="copiarCodigo('${res.codigo}')">
                📋 Copiar Código
              </button>
            `;
          }

          mostrarModal("info", mensagemFinal);

        })
        .withFailureHandler(function(err) {
          mostrarModal("erro", err.message);
        })
        .buscarLivroSistema(nomeLivro);
    }

          function copiarCodigo(codigo) {
      navigator.clipboard.writeText(codigo);
      alert("Código copiado!");
    }

     
   function toggleTheme() {
      document.body.classList.toggle("dark-mode");
    }

  </script>
