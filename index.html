  <script>

  //FUNÇÃO INTELIGENTE PARA MOSTRAR OS MODAIS

  function mostrarModal(tipo, mensagem) {
    const header = document.getElementById("modalHeader");
    const titulo = document.getElementById("modalTitulo")
    const texto = document.getElementById("modalMensagem")

    texto.innerText = mensagem;

    if (tipo === 'erro') {
      header.className = 'modal-header bg-danger text-white';
      titulo.innerText = 'ERRO';
    }

      if (tipo === "sucesso") {
        header.className = "modal-header bg-success text-white";
        titulo.innerText = 'SUCESSO';
      }

    const modal = new bootstrap.Modal(document.getElementById("modalAviso"));
    modal.show();
    
  }
    
    document.getElementById("btnEnviarTudo").addEventListener("click", enviarEmprestimo);

    document.getElementById("btnDevolucao").addEventListener("click",devolver)
    
    // ENVIAR O EMPRÉSTIMO

    function enviarEmprestimo() {
      const pessoa = document.getElementById("nomePessoa").value;
      const contato = document.getElementById("contatoPessoa").value;
      const codigo = document.getElementById("codigoLivro").value;
      const titulo = document.getElementById("tituloLivro").value;
      const autor = document.getElementById("autorLivro").value;
      const dataDevolucao = document.getElementById("dataDevolucao").value;
      const preco = document.getElementById("precoLivro").value;

      // SE A PESSOA NÃO PREENCHER O CAMPO

      if (
          pessoa.trim() === "" ||
          contato.trim() === "" ||
          codigo.trim() === "" ||
          titulo.trim() === "" ||
          autor.trim() === "" ||
          dataDevolucao === "" ||
          preco.trim() === ""
      ) {
        mostrarModal ("erro", "⚠️ Preencha TODOS os campos antes de enviar.")
        return;
      }


      const hoje = new Date();
      hoje.setHours(0,0,0,0);

      const dataEscolhida = new Date(dataDevolucao);
      dataEscolhida.setHours(0,0,0,0);

      if (dataEscolhida < hoje) {
        mostrarModal("erro", "⚠️ Não é permitido selecionar uma data passada para devolução.");
        return;
      }


      const dados = {
        pessoa,
        contato,
        codigo,
        titulo,
        autor,
        dataDevolucao,
        preco
      };

      google.script.run
        .withSuccessHandler(msg => {
          mostrarModal("sucesso", msg);
          
          // LIMPAR TODOS OS CAMPOS

          document.getElementById("nomePessoa").value = "";
          document.getElementById("contatoPessoa").value = "";
          document.getElementById("codigoLivro").value = "";
          document.getElementById("tituloLivro").value = "";
          document.getElementById("autorLivro").value = "";
          document.getElementById("dataDevolucao").value = "";
          document.getElementById("precoLivro").value = "";

        })
        .withFailureHandler(err => mostrarModal("erro", err.message))
        .processarEmprestimo(dados);

    }


     function toggleTheme() {
      document.body.classList.toggle("dark-mode");
    }

    // DEVOLUÇÃO DO LIVRO

    function devolver() {
      const codigo = document.getElementById("codigoRetirada").value;

      if (!codigo) {
        mostrarModal("erro", "informe o código para devolução.");
        return;
      }

      google.script.run

        .withSuccessHandler(msg => {
          mostrarModal("sucesso", msg);
          document.getElementById("codigoRetirada").value = "";
        })

        .withFailureHandler(err => {
          mostrarModal("erro", err.message);
        
        })

        .devolverLivro(codigo)
    }


    window.addEventListener("load", function () {

      google.script.run
        .withSuccessHandler(function(avisos) {

          if (avisos.length > 0) {

            mostrarModal(
              "erro",
              avisos.join("\n\n")
            );

          }

        })
        .verificarAvisosEntrega();

    });

    //  bloqueia dias passados no emprestimo

    window.addEventListener("load", function () {

      const hoje = new Date().toISOString().split("T")[0];
      document.getElementById("dataDevolucao").setAttribute("min", hoje);

    });


  </script>
